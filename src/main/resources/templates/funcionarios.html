<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Funcionários</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#161616;
    color:white;
}

.card{
    background:#333333;
    border:none;
    border-radius:15px;
}

.funcionario-card{
    background:#444;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
}

.funcionario-card:hover{
    background:#555;
}

.acoes{
    margin-top:10px;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="card p-4">

<h1 class="mb-4">Funcionários</h1>

<a href="/funcionarios/novo"
   class="btn btn-success mb-4">
    + Novo Funcionário
</a>

<form method="get" action="/funcionarios">

<div class="input-group mb-4">

<input
    type="text"
    name="busca"
    class="form-control"
    placeholder="Pesquisar funcionário">

<button class="btn btn-success">
    Buscar
</button>

</div>

</form>

<div th:each="funcionario : ${funcionarios}"
     class="funcionario-card">

    <h5 th:text="${funcionario.nome}"></h5>

    <div class="acoes">

        <a class="btn btn-primary btn-sm"
           th:href="@{/funcionarios/{id}(id=${funcionario.id})}">
            Visualizar
        </a>

        <a class="btn btn-warning btn-sm"
           th:href="@{/funcionarios/editar/{id}(id=${funcionario.id})}">
            Editar
        </a>

        <a class="btn btn-danger btn-sm"
           onclick="return confirm('Deseja realmente excluir este funcionário?')"
           th:href="@{/funcionarios/excluir/{id}(id=${funcionario.id})}">
            Excluir
        </a>

    </div>

</div>

</div>

</div>

</body>

</html>

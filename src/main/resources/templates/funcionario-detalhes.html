<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Detalhes do Funcionário</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#1e1e1e;
            color:white;
        }

        .card{
            background:#4a4a4b;
            border:none;
            border-radius:15px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.4);
        }

        .label{
            color:#dcdcdc;
            font-weight:bold;
        }

        .valor{
            color:white;
            font-size:18px;
        }

        textarea{
            background:#3a3a3a !important;
            color:white !important;
            border:none !important;
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <div class="card p-4">

        <h2 class="mb-4">
            Detalhes do Funcionário
        </h2>

        <p>
            <span class="label">Nome:</span><br>
            <span class="valor" th:text="${funcionario.nome}"></span>
        </p>

        <p>
            <span class="label">CPF:</span><br>
            <span class="valor" th:text="${funcionario.cpf}"></span>
        </p>

        <p>
            <span class="label">RG:</span><br>
            <span class="valor" th:text="${funcionario.rg}"></span>
        </p>

        <p>
            <span class="label">Telefone:</span><br>
            <span class="valor" th:text="${funcionario.telefone}"></span>
        </p>

        <p>
            <span class="label">E-mail:</span><br>
            <span class="valor" th:text="${funcionario.email}"></span>
        </p>

        <p>
            <span class="label">PIS:</span><br>
            <span class="valor" th:text="${funcionario.pis}"></span>
        </p>

        <p>
            <span class="label">CTPS:</span><br>
            <span class="valor" th:text="${funcionario.ctps}"></span>
        </p>

        <p>
            <span class="label">Data de Admissão:</span><br>
            <span class="valor" th:text="${funcionario.dataAdmissao}"></span>
        </p>

        <p>
            <span class="label">Data de Demissão:</span><br>
            <span class="valor" th:text="${funcionario.dataDemissao}"></span>
        </p>

        <p>
            <span class="label">Função:</span><br>
            <span class="valor" th:text="${funcionario.funcao}"></span>
        </p>

        <p>
            <span class="label">Salário:</span><br>
            <span class="valor" th:text="${funcionario.salario}"></span>
        </p>

        <form th:action="@{/funcionarios/salvar-observacao}" method="post">

            <input type="hidden"
                   name="id"
                   th:value="${funcionario.id}">

            <p>
                <span class="label">Observações:</span>
            </p>

            <textarea
                    class="form-control"
                    rows="6"
                    name="observacao"
                    th:text="${funcionario.observacao}">
            </textarea>

            <div class="mt-4">

                <button type="submit"
                        class="btn btn-success">
                    Salvar Observação
                </button>

                <a th:href="@{/funcionarios/{id}/lancamentos(id=${funcionario.id})}"
                  class="btn btn-primary">
                   Lançamentos
                </a>

                <a th:href="@{/funcionarios}"
                   class="btn btn-secondary">
                    Voltar
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>

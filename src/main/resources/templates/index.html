<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Sistema da Tia Toti</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color:#1e1e1e;
            color:white;
            height:100vh;
        }

        .card-home{
            background-color:#252526;
            border:none;
            border-radius:20px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.5);
        }

        .titulo{
            font-size:3rem;
            font-weight:bold;
        }

        .subtitulo{
            color:#c5c5c5;
            font-size:1.2rem;
        }

    </style>

</head>

<body>

<div class="container h-100">

    <div class="row h-100 justify-content-center align-items-center">

        <div class="col-md-8">

            <div class="card card-home p-5 text-center">

                <h1 class="titulo">
                    Sistema da Tia Toti
                </h1>

                <p class="subtitulo mt-3">
                    Gerenciamento de Funcionários
                </p>

                <hr class="text-light">

                <p>
                    Consulte, cadastre e organize os dados dos funcionários de forma rápida e simples.
                </p>

                <div class="mt-4">

                    <a href="/funcionarios"
                       class="btn btn-success btn-lg">
                        Acessar Funcionários
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>

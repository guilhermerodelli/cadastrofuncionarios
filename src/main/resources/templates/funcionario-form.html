<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>Funcionário</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#1e1e1e;
    color:white;
}

.card{
    background:#5e5e5f;
    border:none;
    border-radius:15px;
}

label{
    color:#ffffff;
    font-weight:bold;
    margin-bottom:5px;
}

.form-control{
    background:#444343;
    border:none;
    color:white;
}

.form-control:focus{
    background:#3a3a3a;
    color:white;
}

.erro{
    color:#ff6b6b;
    font-size:14px;
    margin-top:5px;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="card p-4">

<h2 class="mb-4"
    th:text="${funcionario.id == null ? 'Cadastrar Funcionário' : 'Editar Funcionário'}">
</h2>

<form th:action="@{/funcionarios/salvar}"
      th:object="${funcionario}"
      method="post">

    <input type="hidden" th:field="*{id}">

    <div class="mb-3">
        <label>Nome</label>

        <input type="text"
               th:field="*{nome}"
               class="form-control">

        <div class="erro"
             th:if="${#fields.hasErrors('nome')}"
             th:errors="*{nome}">
        </div>
    </div>

    <div class="mb-3">
        <label>CPF</label>

        <input type="text"
               th:field="*{cpf}"
               maxlength="11"
               class="form-control">

        <div class="erro"
             th:if="${#fields.hasErrors('cpf')}"
             th:errors="*{cpf}">
        </div>
    </div>

    <div class="mb-3">
        <label>RG</label>

        <input type="text"
               th:field="*{rg}"
               class="form-control">

        <div class="erro"
             th:if="${#fields.hasErrors('rg')}"
             th:errors="*{rg}">
        </div>
    </div>

    <div class="mb-3">
        <label>Telefone</label>

        <input type="text"
               th:field="*{telefone}"
               maxlength="11"
               class="form-control">

        <div class="erro"
             th:if="${#fields.hasErrors('telefone')}"
             th:errors="*{telefone}">
        </div>
    </div>

    <div class="mb-3">
        <label>E-mail</label>

        <input type="email"
               th:field="*{email}"
               class="form-control">

        <div class="erro"
             th:if="${#fields.hasErrors('email')}"
             th:errors="*{email}">
        </div>
    </div>

    <div class="mb-3">
        <label>PIS</label>

        <input type="text"
               th:field="*{pis}"
               maxlength="11"
               class="form-control">

        <div class="erro"
             th:if="${#fields.hasErrors('pis')}"
             th:errors="*{pis}">
        </div>
    </div>

    <div class="mb-3">
        <label>CTPS</label>

        <input type="text"
               th:field="*{ctps}"
               class="form-control">

        <div class="erro"
             th:if="${#fields.hasErrors('ctps')}"
             th:errors="*{ctps}">
        </div>
    </div>

    <div class="mb-3">
        <label>Data de Admissão</label>

        <input type="date"
               th:field="*{dataAdmissao}"
               class="form-control">

        <div class="erro"
             th:if="${#fields.hasErrors('dataAdmissao')}"
             th:errors="*{dataAdmissao}">
        </div>
    </div>

    <div class="mb-3">
        <label>Data de Demissão</label>

        <input type="date"
               th:field="*{dataDemissao}"
               class="form-control">
    </div>

    <div class="mb-3">
        <label>Função</label>

        <input type="text"
               th:field="*{funcao}"
               class="form-control">

        <div class="erro"
             th:if="${#fields.hasErrors('funcao')}"
             th:errors="*{funcao}">
        </div>
    </div>

    <div class="mb-3">
        <label>Salário</label>

        <input type="number"
               step="0.01"
               th:field="*{salario}"
               class="form-control">

        <div class="erro"
             th:if="${#fields.hasErrors('salario')}"
             th:errors="*{salario}">
        </div>
    </div>

    <div class="mb-3">
        <label>Observação</label>

        <textarea
                th:field="*{observacao}"
                rows="5"
                class="form-control">
        </textarea>
    </div>

    <button type="submit"
            class="btn btn-success">
        Salvar Funcionário
    </button>

    <a href="/funcionarios"
       class="btn btn-secondary">
        Voltar
    </a>

</form>

</div>

</div>

</body>
</html>

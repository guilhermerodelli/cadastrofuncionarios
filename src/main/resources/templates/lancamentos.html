<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">
<title>Lançamentos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#1e1e1e;
    color:white;
}

.card{
    background:#5e5e5f;
    border:none;
    border-radius:15px;
}

.table{
    color:white;
}

.table thead{
    background:#444343;
}

.table tbody tr{
    background:#555;
}

.table tbody tr:hover{
    background:#666;
}

</style>

</head>
<body>

<div class="container mt-5">

    <div class="card p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2>
                Lançamentos de
                <span th:text="${funcionario.nome}"></span>
            </h2>

            <div>

                <a
                    th:href="@{/funcionarios/{id}/lancamentos/novo(id=${funcionario.id})}"
                    class="btn btn-success">
                    Novo Lançamento
                </a>

                <a
                    th:href="@{/funcionarios/{id}/lancamentos/pdf(id=${funcionario.id})}"
                    class="btn btn-danger">
                    Gerar PDF
                </a>

                <a
                    th:href="@{/funcionarios}"
                    class="btn btn-secondary">
                    Voltar
                </a>

            </div>

        </div>

        <table class="table table-bordered table-dark">

            <thead>

            <tr>
                <th>Data Lançamento</th>
                <th>Data Pagamento</th>
                <th>Histórico</th>
                <th>Valor</th>
            </tr>

            </thead>

            <tbody>

            <tr th:if="${#lists.isEmpty(lancamentos)}">
                <td colspan="4" class="text-center">
                    Nenhum lançamento encontrado
                </td>
            </tr>

            <tr th:each="l : ${lancamentos}">

                <td th:text="${l.dataLancamento}"></td>

                <td th:text="${l.dataPagamento}"></td>

                <td th:text="${l.historico}"></td>

                <td th:text="${#numbers.formatDecimal(l.valor,1,2)}"></td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
